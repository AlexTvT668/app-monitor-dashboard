# ============================================================
#  OVHMR 资源位监控配置 v3
#  数据来源：《OVHMR监控资源范围.xlsx》
#  5 家厂商（OPPO / VIVO / 华为 / 小米 / 荣耀） × 71 个资源位
#  字段说明：
#    slot_id           资源位内部 id
#    name              资源位名称（与 Excel 一致）
#    reach             触达链路（打开时/首页首屏/二级页第1屏...）
#    final_grade       最终定级（S / A+ / A / A- / B+ / B / C）
#    combo_grade       综合建议等级
#    op_grade_max      运营最高获取评级
#    op_grade_min      运营最低获取评级
#    channels          入口：app_store | game_center
#    platforms         华为专属：emui | harmony_next；其他默认 [android]
#    priority          采集优先级（S=1 每日必采，A+=2，A=3，B+=4，C=5）
#    top_n             采集深度（S/A+：Top20；A：Top15；B+：Top10；C：Top5）
# ============================================================

rating_scheme:
  levels: [S, "A+", A, "A-", "B+", B, C]
  priority:
    S: 1
    "A+": 2
    A: 3
    "A-": 3
    "B+": 4
    B: 4
    C: 5
  top_n:
    S: 20
    "A+": 20
    A: 15
    "A-": 15
    "B+": 10
    B: 10
    C: 5

# ===================== 华为（含双框架） =====================
huawei:
  # 应用市场 AppGallery 应用商店入口
  platforms: [emui, harmony_next]
  channels: [app_store, game_center]
  slots:
    - slot_id: hw_01
      name: 闪屏
      reach: 打开时
      final_grade: S
      combo_grade: A+
      op_grade_max: S
      op_grade_min: A
      channels: [app_store, game_center]
    - slot_id: hw_02
      name: Today
      reach: 首页首屏
